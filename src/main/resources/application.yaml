spring:
  application:
    name: ecommerce-api

  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate        # never modify schema; schema.sql is the source of truth
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  elasticsearch:
    uris: http://localhost:9200

app:
  ingest:
    mysql:
      enabled: false       # dummyjson -> MySQL (APP_INGEST_MYSQL_ENABLED env var)
    elasticsearch:
      enabled: false       # MySQL -> Elasticsearch, no network call (APP_INGEST_ELASTICSEARCH_ENABLED env var)

logging:
  level:
    org.hibernate.sql: debug
